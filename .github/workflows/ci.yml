name: Free85 validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run Free85 tests
        run: npm test

      - name: Upload visual regression diffs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: free85-visual-diffs
          path: test-results/free85-visual/
          if-no-files-found: ignore
          retention-days: 14

